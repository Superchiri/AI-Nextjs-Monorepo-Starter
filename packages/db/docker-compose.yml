name: next-prisma-postgresql-better-auth-ultracite-skills-ruler-mcp

services:
  postgres:
    image: postgres
    container_name: next-prisma-postgresql-better-auth-ultracite-skills-ruler-mcp-postgres
    environment:
      POSTGRES_DB: next-prisma-postgresql-better-auth-ultracite-skills-ruler-mcp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - next-prisma-postgresql-better-auth-ultracite-skills-ruler-mcp_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  next-prisma-postgresql-better-auth-ultracite-skills-ruler-mcp_postgres_data:
